<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Interclasse</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .ranking-container { width: 100%; max-width: 600px; background: #16213e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #fbc531; margin-bottom: 5px; }
        p { color: #a2a2bd; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #e94560; padding: 12px; border-bottom: 2px solid #0f3460; }
        td { padding: 15px 12px; border-bottom: 1px solid #0f3460; text-align: left; }
        .posicao { font-weight: bold; color: #fbc531; width: 40px; }
        .valor { color: #4cd137; font-weight: bold; text-align: right; }
        th:last-child { text-align: right; }
        .voltar { color: #a2a2bd; text-decoration: none; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="ranking-container">
        <h1>🏆 Ranking Interclasse</h1>
        <p>Acompanhe quem está dominando o patrimônio!</p>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Time</th>
                    <th>Patrimônio</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr>
                    <td colspan="3" style="text-align:center;">Buscando dados na nuvem...</td>
                </tr>
            </tbody>
        </table>

        <a href="menu.html" class="voltar">⬅ Voltar ao Menu</a>
    </div>

    <script>
        // URL DO SEU FIREBASE
        const DB_URL = "https://cartola-fb340-default-rtdb.firebaseio.com";

        async function carregarRanking() {
            const corpo = document.getElementById('corpoTabela');

            try {
                const res = await fetch(`${DB_URL}/contas.json`);
                const contasData = await res.json();

                if (!contasData) {
                    corpo.innerHTML = "<tr><td colspan='3'>Nenhum time cadastrado.</td></tr>";
                    return;
                }

                // Transforma o objeto em lista e calcula o valor total de cada time
                let listaRanking = Object.keys(contasData).map(id => {
                    const conta = contasData[id];
                    
                    // Soma o valor dos jogadores comprados (Elenco)
                    let valorElenco = 0;
                    if (conta.elenco) {
                        Object.values(conta.elenco).forEach(jog => {
                            valorElenco += parseFloat(jog.preco) || 0;
                        });
                    }

                    return {
                        nome: conta.nomeTime,
                        total: (parseFloat(conta.saldo) || 0) + valorElenco
                    };
                });

                // Ordena do maior para o menor
                listaRanking.sort((a, b) => b.total - a.total);

                // Limpa e preenche a tabela
                corpo.innerHTML = "";
                listaRanking.forEach((item, index) => {
                    corpo.innerHTML += `
                        <tr>
                            <td class="posicao">${index + 1}º</td>
                            <td>${item.nome}</td>
                            <td class="valor">C$ ${item.total.toFixed(2)}</td>
                        </tr>
                    `;
                });

            } catch (error) {
                corpo.innerHTML = "<tr><td colspan='3'>Erro ao conectar com o banco.</td></tr>";
            }
        }

        carregarRanking();
    </script>
</body>
</html>
