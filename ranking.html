<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Interclasse</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .ranking-container { width: 100%; max-width: 600px; background: #16213e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #fbc531; margin-bottom: 5px; }
        p { color: #a2a2bd; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #e94560; padding: 12px; border-bottom: 2px solid #0f3460; }
        td { padding: 15px 12px; border-bottom: 1px solid #0f3460; text-align: left; }
        .posicao { font-weight: bold; color: #fbc531; width: 40px; }
        .valor { color: #4cd137; font-weight: bold; text-align: right; }
        th:last-child { text-align: right; }
        .voltar { color: #a2a2bd; text-decoration: none; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="ranking-container">
        <h1>🏆 Ranking Interclasse</h1>
        <p>Acompanhe quem está dominando o patrimônio!</p>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Time</th>
                    <th>Patrimônio</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr>
                    <td colspan="3" style="text-align:center;">Buscando dados na nuvem...</td>
                </tr>
            </tbody>
        </table>

        <a href="menu.html" class="voltar">⬅ Voltar ao Menu</a>
    </div>

<script>
    const DB_URL = "https://cartola-fb340-default-rtdb.firebaseio.com";

    async function carregarRanking() {
        const corpo = document.getElementById('corpoTabela');

        try {
            // 1. Busca as contas e os jogadores AO MESMO TEMPO
            const [resContas, resJogadores] = await Promise.all([
                fetch(`${DB_URL}/contas.json`),
                fetch(`${DB_URL}/jogadores.json`)
            ]);

            const contasData = await resContas.json();
            const jogadoresData = await resJogadores.json();

            if (!contasData || !jogadoresData) {
                corpo.innerHTML = "<tr><td colspan='3'>Aguardando dados...</td></tr>";
                return;
            }

            // 2. Mapeia os preços atuais do mercado para consulta rápida
            // Isso garante que pegamos o valor de AGORA, não o de quando comprou
            const precosAtuais = {};
            Object.values(jogadoresData).forEach(j => {
                precosAtuais[j.nome] = parseFloat(j.preco);
            });

            let listaRanking = Object.keys(contasData).map(id => {
                const conta = contasData[id];
                
                // 3. Calcula o Valor do Elenco com Preços de AGORA
                let valorAtualDoElenco = 0;
                if (conta.elenco) {
                    Object.values(conta.elenco).forEach(jogNoTime => {
                        // Busca o preço que está no mercado hoje para esse nome
                        const precoHoje = precosAtuais[jogNoTime.nome] || parseFloat(jogNoTime.preco);
                        valorAtualDoElenco += precoHoje;
                    });
                }

                // Patrimônio Total = Dinheiro em caixa + Valorização dos Jogadores
                const patrimonioTotal = (parseFloat(conta.saldo) || 0) + valorAtualDoElenco;
                const pontos = parseFloat(conta.pontosTotais) || 0;

                return {
                    nome: conta.nomeTime,
                    pontos: pontos,
                    patrimonio: patrimonioTotal
                };
            });

            // 4. Ordenação: Quem tem o maior Patrimônio Total (Saldo + Valorização)
            listaRanking.sort((a, b) => b.patrimonio - a.patrimonio);

            corpo.innerHTML = "";
            listaRanking.forEach((item, index) => {
                corpo.innerHTML += `
                    <tr>
                        <td class="posicao">${index + 1}º</td>
                        <td>
                            <div style="font-weight:bold;">${item.nome}</div>
                            <div style="font-size:0.75rem; color:#4cd137;">Pts: ${item.pontos.toFixed(1)}</div>
                        </td>
                        <td class="valor">C$ ${item.patrimonio.toFixed(2)}</td>
                    </tr>
                `;
            });

        } catch (error) {
            console.error(error);
            corpo.innerHTML = "<tr><td colspan='3'>Erro ao sincronizar ranking.</td></tr>";
        }
    }

    carregarRanking();
</script>
</body>
</html>
