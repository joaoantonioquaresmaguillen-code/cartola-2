<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado - Cartola Interclasse</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background-color: #1a1a2e; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { background-color: #0f3460; width: 100%; max-width: 900px; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .header h2 { margin: 0; color: #e94560; }
        .saldo { font-size: 1.5rem; font-weight: bold; color: #4cd137; }
        .grid-container { display: flex; gap: 20px; width: 100%; max-width: 900px; flex-wrap: wrap; }
        .coluna { flex: 1; min-width: 320px; background-color: #16213e; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h3 { border-bottom: 2px solid #e94560; padding-bottom: 10px; margin-top: 0; }
        .card-jogador { background-color: #1a1a2e; border: 1px solid #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .foto-perfil { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #e94560; margin-right: 15px; }
        .info-container { display: flex; align-items: center; }
        .info-jogador { display: flex; flex-direction: column; }
        .nome { font-weight: bold; font-size: 1.1rem; }
        .posicao { font-size: 0.8rem; color: #a2a2bd; background: #0f3460; padding: 3px 6px; border-radius: 4px; width: fit-content; margin-top: 5px;}
        .preco { font-weight: bold; color: #fbc531; margin-bottom: 8px; font-size: 1.1rem; }
        button { padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-comprar { background-color: #4cd137; color: #1a1a2e; }
        .btn-comprar:hover { background-color: #44bd32; }
        .btn-vender { background-color: #e84118; color: white; }
        .btn-vender:hover { background-color: #c23616; }
        a.voltar { color: #a2a2bd; text-decoration: none; margin-bottom: 20px; display: block; width: 100%; max-width: 900px; }
    </style>
</head>
<body>

    <a href="menu.html" class="voltar">⬅ Voltar ao Menu</a>

    <div class="header">
        <div>
            <h2 id="displayNomeTime">Carregando...</h2>
            <span style="color: #a2a2bd;">Treinador: <span id="displayTreinador"></span></span>
        </div>
        <div style="text-align: right;">
            <div style="color: #a2a2bd; font-size: 0.9rem;">Caixa (Livre)</div>
            <div class="saldo">C$ <span id="displaySaldo">0.00</span></div>
        </div>
    </div>

    <div class="grid-container">
        <div class="coluna">
            <h3>Mercado (Disponíveis)</h3>
            <div id="listaMercado">Buscando jogadores...</div>
        </div>

        <div class="coluna">
            <h3>Meu Elenco</h3>
            <div id="listaMeuElenco">Buscando seu time...</div>
        </div>
    </div>

    <script>
    const DB_URL = "https://cartola-fb340-default-rtdb.firebaseio.com";
    const avatarPadrao = 'https://www.pngall.com/wp-content/uploads/5/Profile-Avatar-PNG.png';

    let logadoLocal = JSON.parse(localStorage.getItem('usuario_logado'));
    if (!logadoLocal) window.location.href = "index.html";

    const domTime = document.getElementById('displayNomeTime');
    const domTreinador = document.getElementById('displayTreinador');
    const domSaldo = document.getElementById('displaySaldo');
    const domMercado = document.getElementById('listaMercado');
    const domElenco = document.getElementById('listaMeuElenco');

    async function atualizarTela() {
        // Puxa sua conta e o mercado global ao mesmo tempo
        const [resContas, resJog] = await Promise.all([
            fetch(`${DB_URL}/contas.json`),
            fetch(`${DB_URL}/jogadores.json`)
        ]);
        
        const contasData = await resContas.json();
        const jogadoresData = await resJog.json();
        
        const idFirebase = Object.keys(contasData).find(id => contasData[id].nomeTime === logadoLocal.nomeTime);
        const minhaConta = contasData[idFirebase];
        const mercadoGlobal = jogadoresData ? Object.keys(jogadoresData).map(id => ({ id, ...jogadoresData[id] })) : [];

        // 1. CRIA UM DICIONÁRIO DE PREÇOS ATUAIS
        // Isso serve para saber o preço que o jogador tem HOJE no mercado
        const precosHoje = {};
        mercadoGlobal.forEach(j => {
            precosHoje[j.nome] = parseFloat(j.preco);
        });

        // Atualiza cabeçalho
        domTime.innerText = minhaConta.nomeTime;
        domTreinador.innerText = minhaConta.treinador;
        domSaldo.innerText = parseFloat(minhaConta.saldo).toFixed(2);

        domMercado.innerHTML = '';
        domElenco.innerHTML = '';

        // 2. RENDERIZA MERCADO
        mercadoGlobal.forEach((jogador) => {
            const jaComprado = minhaConta.elenco && Object.values(minhaConta.elenco).find(j => j.nome === jogador.nome);
            if (!jaComprado) {
                domMercado.innerHTML += `
                    <div class="card-jogador">
                        <div class="info-container">
                            <img src="${jogador.foto || avatarPadrao}" class="foto-perfil" onerror="this.src='${avatarPadrao}'">
                            <div class="info-jogador">
                                <span class="nome">${jogador.nome}</span>
                                <span class="posicao">${jogador.posicao}</span>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="preco">C$ ${parseFloat(jogador.preco).toFixed(2)}</div>
                            <button class="btn-comprar" onclick="comprarJogador('${idFirebase}', ${JSON.stringify(jogador).replace(/"/g, '&quot;')})">Comprar</button>
                        </div>
                    </div>
                `;
            }
        });

        // 3. RENDERIZA MEU ELENCO (COM O PREÇO ATUALIZADO)
        if (!minhaConta.elenco || Object.keys(minhaConta.elenco).length === 0) {
            domElenco.innerHTML = '<p style="color: #a2a2bd; text-align:center;">Seu time está vazio.</p>';
        } else {
            Object.keys(minhaConta.elenco).forEach((idNoElenco) => {
                const jogadorSalvo = minhaConta.elenco[idNoElenco];
                
                // O PULO DO GATO: Mostra o preço que ele tem lá no mercado global hoje, e não o de ontem!
                const precoAtual = precosHoje[jogadorSalvo.nome] || parseFloat(jogadorSalvo.preco);

                domElenco.innerHTML += `
                    <div class="card-jogador">
                        <div class="info-container">
                            <img src="${jogadorSalvo.foto || avatarPadrao}" class="foto-perfil" onerror="this.src='${avatarPadrao}'">
                            <div class="info-jogador">
                                <span class="nome">${jogadorSalvo.nome}</span>
                                <span class="posicao">${jogadorSalvo.posicao}</span>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="preco" style="color:#4cd137;">C$ ${precoAtual.toFixed(2)}</div>
                            <button class="btn-vender" onclick="venderJogador('${idFirebase}', '${idNoElenco}', '${jogadorSalvo.nome}')">Vender</button>
                        </div>
                    </div>
                `;
            });
        }
    }

    // 4. COMPRAR JOGADOR
    async function comprarJogador(idConta, jogador) {
        const res = await fetch(`${DB_URL}/contas/${idConta}.json`);
        const conta = await res.json();

        if (parseFloat(conta.saldo) >= parseFloat(jogador.preco)) {
            const novoSaldo = (parseFloat(conta.saldo) - parseFloat(jogador.preco)).toFixed(2);
            
            await fetch(`${DB_URL}/contas/${idConta}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ saldo: novoSaldo })
            });

            await fetch(`${DB_URL}/contas/${idConta}/elenco.json`, {
                method: 'POST',
                body: JSON.stringify(jogador)
            });

            atualizarTela();
        } else {
            alert("Caixa insuficiente para essa contratação!");
        }
    }

    // 5. VENDER JOGADOR (RECEBENDO A VALORIZAÇÃO)
    async function venderJogador(idConta, idItemNoElenco, nomeDoJogador) {
        // Primeiro: vai na nuvem ver quanto ele tá custando no mercado global AGORA
        const resMercado = await fetch(`${DB_URL}/jogadores.json`);
        const jogadoresNoMercado = await resMercado.json();
        
        let precoDeVenda = 0;
        if (jogadoresNoMercado) {
            const jogGlobal = Object.values(jogadoresNoMercado).find(j => j.nome === nomeDoJogador);
            if (jogGlobal) precoDeVenda = parseFloat(jogGlobal.preco);
        }

        // Pega a conta pra ver o saldo atual
        const resConta = await fetch(`${DB_URL}/contas/${idConta}.json`);
        const conta = await resConta.json();

        // Adiciona o PREÇO VALORIZADO no saldo
        const novoSaldo = (parseFloat(conta.saldo) + precoDeVenda).toFixed(2);

        // Atualiza o saldo no banco
        await fetch(`${DB_URL}/contas/${idConta}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ saldo: novoSaldo })
        });

        // Tira o cara do time
        await fetch(`${DB_URL}/contas/${idConta}/elenco/${idItemNoElenco}.json`, {
            method: 'DELETE'
        });

        atualizarTela();
    }

    // Inicializa a tela
    atualizarTela();
    </script>
</body>
</html>
